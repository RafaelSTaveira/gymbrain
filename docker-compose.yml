x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__FERNET_KEY: ""
  PYTHONPATH: /opt/airflow
  GEMINI_API_KEY: ${GEMINI_API_KEY}
  GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-gemini-2.5-flash}
  GYMBRAIN_DB_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${GYMBRAIN_DB}

# env_file resolve o caminho relativo ao diretorio deste arquivo (nao ao cwd
# de onde "docker compose" e chamado), entao garante que o .env chegue nos
# containers mesmo que a interpolacao ${VAR} do compose falhe por algum
# motivo (ex: comando rodado de outro diretorio). Variaveis repetidas em
# "environment" tem prioridade sobre as vindas de "env_file".
x-airflow-common-env-file: &airflow-common-env-file
  - .env

x-airflow-common-volumes: &airflow-common-volumes
  - ./dags:/opt/airflow/dags
  - ./src:/opt/airflow/src
  - ./data:/opt/airflow/data
  - ./requirements.txt:/requirements.txt

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GYMBRAIN_DB: ${GYMBRAIN_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-gymbrain-db.sh:/docker-entrypoint-initdb.d/init-gymbrain-db.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  airflow-init:
    image: apache/airflow:2.9.3-python3.11
    depends_on:
      postgres:
        condition: service_healthy
    env_file: *airflow-common-env-file
    environment: *airflow-common-env
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install -r /requirements.txt -q
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
    volumes: *airflow-common-volumes

  airflow-webserver:
    image: apache/airflow:2.9.3-python3.11
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file: *airflow-common-env-file
    environment: *airflow-common-env
    ports:
      - "8080:8080"
    volumes: *airflow-common-volumes
    command: bash -c "pip install -r /requirements.txt -q && airflow webserver"

  airflow-scheduler:
    image: apache/airflow:2.9.3-python3.11
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    env_file: *airflow-common-env-file
    environment: *airflow-common-env
    volumes: *airflow-common-volumes
    command: bash -c "pip install -r /requirements.txt -q && airflow scheduler"

volumes:
  postgres_data:
